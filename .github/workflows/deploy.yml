name: Deploy to Hostinger

# main에 푸시하면 정적 빌드 후 SSH(rsync)로 Hostinger에 배포.
# Hostinger가 클라우드 IP의 FTP를 막아서, SSH/SFTP 경로로 우회한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build # ASTRO_KEYSTATIC=0 → 순수 정적 dist/

      - name: Deploy via SFTP (lftp mirror)
        # 이 SSH 계정은 셸이 /sbin/nologin (SFTP 전용)이라 rsync 불가.
        # lftp의 SFTP mirror로 셸 없이 동기화. 비밀번호는 sshpass(env SSHPASS)로 ssh에 주입.
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp sshpass
          lftp sftp://${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }} -e "
              set sftp:connect-program 'sshpass -e ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null';
              set net:timeout 20; set net:max-retries 2;
              mirror -R --delete --verbose --parallel=2 dist/ public_html/;
              bye
            "
