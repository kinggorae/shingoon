name: Deploy to Hostinger

# main에 푸시하면 정적 빌드 후 SSH(rsync)로 Hostinger에 배포.
# Hostinger가 클라우드 IP의 FTP를 막아서, SSH/SFTP 경로로 우회한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build # ASTRO_KEYSTATIC=0 → 순수 정적 dist/

      - name: Deploy via SFTP (paramiko)
        # 이 SSH 계정은 셸이 nologin(SFTP 전용)이라 rsync/lftp 대신 paramiko로 직접 SFTP 미러링.
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR: public_html
          LOCAL_DIR: dist
        run: |
          python3 -m pip install --quiet paramiko
          python3 scripts/deploy_sftp.py
