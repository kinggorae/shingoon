name: Deploy to Hostinger

# main에 푸시하면 정적 빌드 후 SSH(rsync)로 Hostinger에 배포.
# Hostinger가 클라우드 IP의 FTP를 막아서, SSH/SFTP 경로로 우회한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build # ASTRO_KEYSTATIC=0 → 순수 정적 dist/

      - name: Deploy via rsync over SSH (password)
        # SSH 키 추가가 막힌 플랜이라, SSH 비밀번호(=FTP 비밀번호) 인증 사용.
        # 비밀번호는 env(SSHPASS)로만 전달되어 명령줄에 노출되지 않는다.
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync
          sshpass -e rsync -rltgoDzvO --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:public_html/"
