name: Deploy to Hostinger

# main에 푸시하면 정적 빌드 후 SSH(rsync)로 Hostinger에 배포.
# Hostinger가 클라우드 IP의 FTP를 막아서, SSH/SFTP 경로로 우회한다.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build # ASTRO_KEYSTATIC=0 → 순수 정적 dist/

      - name: Deploy via SSH (rsync)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: dist/
          TARGET: ${{ secrets.SSH_TARGET }} # public_html/
          # --delete: 원격에 없어야 할 파일(기존 워드프레스 등) 제거 → 깨끗한 미러
          ARGS: "-rltgoDzvO --delete"
