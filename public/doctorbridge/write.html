<style>
:root{--ink:#191527;--body:#4a4658;--muted:#8a8598;--line:#ece9f2;--bg:#fff;--bg-soft:#f8f6fc;--dark:#120f1d;
  --brand:#7c4dcc;--brand-soft:#efe9fc;--coral:#ec6a86;--gold:#e6a23c;--green:#0e9f6e;--green-soft:#e1f6ee;
  --grad:linear-gradient(120deg,#7c4dcc 0%,#ec6a86 56%,#e6a23c 100%);--radius:16px;--radius-sm:10px;--maxw:780px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;color:var(--body);background:var(--bg-soft);line-height:1.6;-webkit-font-smoothing:antialiased;word-break:keep-all}
img{max-width:100%;display:block}a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:700;font-size:15px;padding:13px 24px;border-radius:999px;border:1.5px solid transparent;cursor:pointer;transition:.15s;font-family:inherit}
.btn-primary{background:var(--grad);color:#fff}.btn-primary:hover{filter:brightness(1.04)}.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
.topbar{background:var(--dark);color:#c9c3d8;font-size:13px}.topbar .wrap{max-width:1000px;display:flex;align-items:center;justify-content:space-between;height:40px}
.tb-proto{font-weight:700;color:#fff;background:var(--grad);border-radius:5px;padding:2px 8px;font-size:11px}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(14,159,110,.25)}
.nav{background:#fff;border-bottom:1px solid var(--line)}.nav .wrap{max-width:1000px;display:flex;align-items:center;justify-content:space-between;height:70px}
.nav .logo-img{height:30px}.nav .links{display:flex;gap:24px;align-items:center}.nav .links a{font-size:15px;font-weight:600;color:var(--body)}
@media(max-width:760px){.nav .links{display:none}}
.page{padding:30px 0 60px}.page h1{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.02em;margin-bottom:20px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:30px}
.field{margin-bottom:18px}.field label{display:block;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--radius-sm);background:#fff}
.field textarea{min-height:220px;resize:vertical;line-height:1.7}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.dropzone{border:1.6px dashed var(--line);border-radius:var(--radius-sm);padding:22px;text-align:center;cursor:pointer;background:var(--bg-soft);font-size:13.5px;color:var(--muted)}
.dropzone:hover{border-color:var(--brand)}.dropzone.filled{border-color:var(--green);background:var(--green-soft);color:var(--green);font-weight:700}
.who{font-size:13px;color:var(--muted);margin-bottom:18px}
.who b{color:var(--ink)}
.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}
.ov{position:fixed;inset:0;background:rgba(18,15,29,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:24px}.ov.show{display:flex}
.ov-box{background:#fff;border-radius:var(--radius);max-width:380px;width:100%;padding:34px;text-align:center}
.ov-box .big{width:68px;height:68px;border-radius:50%;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.ov-box h2{font-size:21px;font-weight:800;color:var(--ink)}.ov-box p{font-size:14px;color:var(--muted);margin-top:8px}
</style>
</head>

<script>
// Dr. Bridge — mock auth/membership state (prototype)
// A "verified member" is a license-verified doctor who can see filler prices.
(function(){
  // demo capture aid: ?demo=member auto-logs in as a verified member (prototype only)
  try{ if(/[?&]demo=member/.test(location.search)){ localStorage.setItem('db_member','verified'); if(!localStorage.getItem('db_name')) localStorage.setItem('db_name','Dr. 김민수'); } }catch(e){}
  window.DBAuth = {
    isMember: function(){ return localStorage.getItem('db_member') === 'verified'; },
    name: function(){ return localStorage.getItem('db_name') || '인증 회원'; },
    login: function(n){ localStorage.setItem('db_member','verified'); if(n) localStorage.setItem('db_name', n); },
    logout: function(){ localStorage.removeItem('db_member'); localStorage.removeItem('db_name'); }
  };
  // Paint the nav auth control: any page with <span id="authCtl"></span>
  function paint(){
    var el = document.getElementById('authCtl');
    if(!el) return;
    if(DBAuth.isMember()){
      el.innerHTML = '<a href="mypage.html" title="마이페이지" style="font-size:13px;font-weight:700;color:#0e9f6e;background:#e1f6ee;border-radius:999px;padding:9px 13px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap">✓ '+DBAuth.name()+'</a> <a class="btn btn-ghost btn-sm" href="#" id="dbLogout">로그아웃</a>';
      var lo = document.getElementById('dbLogout');
      lo.onclick = function(e){ e.preventDefault(); DBAuth.logout(); location.reload(); };
    } else {
      el.innerHTML = '<a class="btn btn-ghost btn-sm" href="login.html?return='+encodeURIComponent(location.pathname+location.search)+'">로그인</a>';
    }
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', paint);
  else paint();
})();

</script>
<script>
// Dr. Bridge — capture-time English layer (prototype).
// When the URL has ?lang=en, swap [data-en] / [data-en-html] to English.
// window.DBL lets page scripts render dynamic (JS-built) text in English too.
window.DBL = /[?&]lang=en/.test(location.search) ? 'en' : 'ko';
(function(){
  if (window.DBL !== 'en') return;
  function swap(){
    document.querySelectorAll('[data-en]').forEach(function(el){ el.textContent = el.getAttribute('data-en'); });
    document.querySelectorAll('[data-en-html]').forEach(function(el){ el.innerHTML = el.getAttribute('data-en-html'); });
    document.documentElement.lang = 'en';
  }
  function run(){ swap(); setTimeout(swap, 250); setTimeout(swap, 700); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run); else run();
})();

</script>
