<style>
:root{--ink:#191527;--body:#4a4658;--muted:#8a8598;--line:#ece9f2;--bg:#fff;--bg-soft:#f8f6fc;--dark:#120f1d;
  --brand:#7c4dcc;--brand-soft:#efe9fc;--coral:#ec6a86;--coral-soft:#fde8ee;--gold:#e6a23c;--gold-soft:#fbeed5;--green:#0e9f6e;--green-soft:#e1f6ee;--blue:#2563eb;--blue-soft:#e7effe;
  --grad:linear-gradient(120deg,#7c4dcc 0%,#ec6a86 56%,#e6a23c 100%);--radius:16px;--radius-sm:10px;--maxw:780px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;color:var(--body);background:var(--bg-soft);line-height:1.7;-webkit-font-smoothing:antialiased;word-break:keep-all}
img{max-width:100%;display:block}a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:700;font-size:15px;padding:11px 20px;border-radius:999px;border:1.5px solid transparent;cursor:pointer;transition:.15s;font-family:inherit}
.btn-primary{background:var(--grad);color:#fff}.btn-primary:hover{filter:brightness(1.04)}.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
.topbar{background:var(--dark);color:#c9c3d8;font-size:13px}.topbar .wrap{max-width:1000px;display:flex;align-items:center;justify-content:space-between;height:40px}
.tb-proto{font-weight:700;color:#fff;background:var(--grad);border-radius:5px;padding:2px 8px;font-size:11px}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(14,159,110,.25)}
.nav{background:#fff;border-bottom:1px solid var(--line)}.nav .wrap{max-width:1000px;display:flex;align-items:center;justify-content:space-between;height:70px}
.nav .logo-img{height:30px}.nav .links{display:flex;gap:24px;align-items:center}.nav .links a{font-size:15px;font-weight:600;color:var(--body)}.nav .links a:hover{color:var(--brand)}
@media(max-width:760px){.nav .links{display:none}}
.crumb{padding:22px 0 0;font-size:13px;color:var(--muted)}.crumb a:hover{color:var(--brand)}
.post{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:30px 32px;margin-top:14px}
.ptag{display:inline-flex;font-size:12px;font-weight:700;border-radius:8px;padding:5px 11px}
.ptag.q{color:var(--blue);background:var(--blue-soft)}.ptag.c{color:var(--coral);background:var(--coral-soft)}.ptag.n{color:var(--green);background:var(--green-soft)}.ptag.j{color:var(--gold);background:var(--gold-soft)}
.post h1{font-size:24px;font-weight:800;color:var(--ink);line-height:1.35;margin:14px 0 12px;letter-spacing:-.01em}
.pmeta{display:flex;align-items:center;gap:12px;font-size:13.5px;color:var(--muted);padding-bottom:18px;border-bottom:1px solid var(--line)}
.pmeta .av{width:34px;height:34px;border-radius:50%;background:var(--grad);color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex:none}
.pmeta b{color:var(--ink);font-weight:700}
.pbody{font-size:16px;color:var(--body);padding:22px 0;white-space:pre-line}
.pbody img{border-radius:12px;border:1px solid var(--line);margin:14px 0}
.tags{display:flex;gap:8px;flex-wrap:wrap}.tags span{font-size:12.5px;font-weight:600;color:var(--brand);background:var(--brand-soft);border-radius:999px;padding:5px 12px}
.pactions{display:flex;gap:10px;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
.pactions button{font-family:inherit;font-size:14px;font-weight:700;color:var(--body);background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:9px 16px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.pactions button:hover{border-color:var(--brand);color:var(--brand)}
.ans-h{font-size:18px;font-weight:800;color:var(--ink);margin:28px 0 14px}
.ans{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:14px}
.ans.best{border-color:#bfe6d3;background:#f4fbf8}
.ans-top{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.ans-top .av{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none}
.ans-top .who{font-size:14.5px;font-weight:700;color:var(--ink)}.ans-top .tm{font-size:12.5px;color:var(--muted)}
.ans-top .best-badge{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--green);background:var(--green-soft);border-radius:999px;padding:4px 11px}
.ans-body{font-size:15px;color:var(--body);white-space:pre-line}
.ans-foot{display:flex;gap:8px;margin-top:12px}
.ans-foot button{font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);background:none;border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer}
.ans-foot button:hover{color:var(--brand);border-color:var(--brand)}
.reply{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-top:8px}
.reply label{font-size:14px;font-weight:700;color:var(--ink);display:block;margin-bottom:10px}
.reply textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);padding:14px;border:1.5px solid var(--line);border-radius:var(--radius-sm);min-height:96px;resize:vertical}
.reply textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.reply .r-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.reply .who-mini{font-size:13px;color:var(--muted)}
.gate{background:var(--brand-soft);border-radius:var(--radius-sm);padding:14px 16px;font-size:14px;color:var(--ink);text-align:center}
.gate a{color:var(--brand);font-weight:700}
</style>

    body:"미간(글라벨라)은 안각동맥 분지가 지나 실명·피부괴사 위험이 보고되는 부위라 늘 조심스럽습니다.\n\n현재는 25~27G 캐뉼라로 골막 상방(supraperiosteal)에 소량씩 후진 주입하고 있는데,\n1) 니들로 진피 깊은 층에 점상 주입하시는 분들도 계신 것 같아 어느 쪽을 선호하시는지\n2) 흡인(aspiration) 음성이어도 안심하기 어렵다는데, 추가로 어떤 안전장치를 두시는지 궁금합니다.",
    ben:"The glabella carries branches of the angular artery, so blindness and skin necrosis have been reported — I'm always cautious here.\n\nRight now I use a 25–27G cannula, supraperiosteal, retrograde, in small amounts.\n1) Some inject deep dermis with a needle in tiny boluses — which do you prefer?\n2) A negative aspiration test isn't reassuring on its own; what else do you do for safety?",
    tags:["필러","미간","안전","합병증"],
    answers:[
      {by:"Dr. 성형",t:"1시간 전",best:true,votes:9,body:"미간은 개인적으로 캐뉼라 + 골막 상방을 기본으로 합니다.\n· 25G 캐뉼라, 1회 0.05~0.1cc 이하로 후진하며 분할\n· 주입 전 압박으로 혈관 비우기, 주입 중 손가락으로 활차상동맥 압박\n· 히알루로니다제(1500IU)·아스피린·안과 연계까지 동선 미리 세팅\n흡인은 보조 지표일 뿐, '저압·소량·천천히·움직이며'가 핵심이라고 봅니다."},
      {by:"Dr. 미용",t:"40분 전",votes:4,body:"니들을 쓰더라도 23G 이상 굵기로, 골막에 닿은 뒤 살짝 빼서 supraperiosteal에 둡니다. 통증·저항 변화에 민감하게 반응하는 게 캐뉼라/니들 선택보다 더 중요하다고 느낍니다."}
    ]},
  2:{cat:"c",title:"임플란트 즉시식립 케이스 공유합니다",by:"Dr. Lee",t:"5시간 전",views:540,likes:22,
    body:"#11 발치 후 즉시식립 + 즉시 임시보철 케이스입니다.\n\n· 발치 시 협측 골판 보존, 갭은 이종골 충전\n· 초기고정 35Ncm 확보 후 비기능성 임시치아\n· 3개월 뒤 최종 보철\n\n사진은 식립 직후 / 임시보철 / 3개월 경과 순입니다. 협측 연조직 볼륨 유지가 관건이었습니다.",
